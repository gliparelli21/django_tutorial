services:
  web:
    build:
      context: .
      dockerfile: DockerFile
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn mysite.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120"
    env_file:
      - .env.ec2
    volumes:
      - sqlite_data:/app/data
    ports:
      - "80:8000"
    restart: unless-stopped

volumes:
  sqlite_data:
